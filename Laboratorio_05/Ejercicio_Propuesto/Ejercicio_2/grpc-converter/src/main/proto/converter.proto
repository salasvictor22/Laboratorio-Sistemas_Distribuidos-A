syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.grpc.converter";
option java_outer_classname = "ConverterProto";

service Converter {

  rpc Convert (ConvertRequest)
  returns (ConvertResponse);

}

message ConvertRequest {

  double value = 1;
  string conversionType = 2;

}

message ConvertResponse {

  double result = 1;
  string message = 2;

}